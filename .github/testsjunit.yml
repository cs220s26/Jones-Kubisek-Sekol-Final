name: CI JUnit

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  JUnitJob:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
    
      - run: mvn test
